name: Update Configs

on:
  # فعال‌سازی اجرای دستی (با قابلیت دریافت لینک جدید)
  workflow_dispatch:
    inputs:
      new_subs:
        description: 'لینک سابسکریپشن جدید (اختیاری، با کاما جدا کنید)'
        required: false
        type: string

  # اجرای خودکار در ساعت 00:00 روز اول هر ماه
  schedule:
    - cron: '0 0 1 * *'

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # اجازه commit و push به مخزن

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Add new subscription links (if provided)
        if: github.event_name == 'workflow_dispatch' && inputs.new_subs
        run: |
          # لینک‌های جدید رو به فایل subscriptions.txt اضافه کن
          IFS=',' read -ra ADDR <<< "${{ inputs.new_subs }}"
          for link in "${ADDR[@]}"; do
            echo "$link" >> subscriptions.txt
          done

      - name: Run config updater
        run: python config_updater.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2rays subscriptions.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update configs [skip ci]"
          git push
