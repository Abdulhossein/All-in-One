
name: Update Configs

on:
  workflow_dispatch:
    inputs:
      new_subs:
        description: 'New subscription links (comma separated)'
        required: false
        type: string
  schedule:
    - cron: '0 0 */2 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Add new subscription links
        if: github.event_name == 'workflow_dispatch' && inputs.new_subs != ''
        env:
          NEW_SUBS: ${{ inputs.new_subs }}
        run: |
          mkdir -p tools/config-update/runtime
          printf '%s\n' "$NEW_SUBS" | tr ',' '\n' | sed '/^[[:space:]]*$/d' >> subscriptions.txt

      - name: Run config updater
        run: python tools/config-update/config_updater.py

      - name: Commit and push changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add v2rays subscriptions.txt tools/config-update/runtime/update_state.json tools/config-update/runtime/v2rays.next || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update configs batch progress [skip ci]"

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push attempt $i failed, retrying after 5 seconds..."
            sleep 5
            git fetch origin main
            git rebase origin/main || git rebase --abort
          done

          echo "Failed to push after 3 attempts"
          exit 1
