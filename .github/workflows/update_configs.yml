name: Update Configs

on:
  workflow_dispatch:
    inputs:
      new_subs:
        description: 'New subscription links (comma separated)'
        required: false
        type: string
  schedule:
    # هر ۲ روز یکبار، ساعت 00:00 UTC
    - cron: '0 0 */2 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Add new subscription links (if provided)
        if: github.event_name == 'workflow_dispatch' && inputs.new_subs
        run: |
          echo "${{ inputs.new_subs }}" | tr ',' '\n' >> subscriptions.txt

      - name: Run config updater
        run: python config_updater.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2rays
          if [ -f subscriptions.txt ]; then git add subscriptions.txt; fi
          # اگر تغییری وجود ندارد، خارج شو
          git diff --quiet && git diff --staged --quiet && exit 0
          git commit -m "Auto-update configs [skip ci]"
          # تلاش برای pull --rebase و push (حداکثر ۳ بار)
          for i in 1 2 3; do
            if git pull --rebase --strategy-option=theirs; then
              if git push; then
                echo "Push successful"
                exit 0
              fi
            fi
            echo "Retry $i failed, waiting 5 seconds..."
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
