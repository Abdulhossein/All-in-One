name: Update Configs

on:
  workflow_dispatch:
    inputs:
      new_subs:
        description: 'New subscription links (comma separated)'
        required: false
        type: string
  schedule:
    - cron: '0 0 1 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Add new subscription links (if provided)
        if: github.event_name == 'workflow_dispatch' && inputs.new_subs
        run: |
          echo "${{ inputs.new_subs }}" | tr ',' '\n' >> subscriptions.txt

      - name: Run config updater
        run: python config_updater.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2rays
          # Only add subscriptions.txt if it exists
          if [ -f subscriptions.txt ]; then git add subscriptions.txt; fi
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update configs [skip ci]"
          git push
